<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Date Scoring</title>
<meta property="og:title" content="Date Scoring">
<meta property="og:description" content="Everyone starts at 100. Few survive. Rate your date across 8 categories and get your verdict.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://bro-xuan.github.io/date-scoring/">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="Date Scoring">
<meta name="twitter:description" content="Everyone starts at 100. Few survive. Rate your date across 8 categories and get your verdict.">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;--card:#1e1e2e;--card-hover:#262640;
  --red:#ff3b5c;--green:#00ff88;--gold:#ffd700;
  --text:#e0e0e0;--muted:#888;--border:#333;
  --orange:#ff9800;--deep-red:#b71c1c;
}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100vh;overflow-x:hidden;
}

/* ── Wizard wrapper ── */
.wizard{position:relative;width:100%;min-height:100vh}

/* ── Step screens ── */
.step{
  position:absolute;top:0;left:0;width:100%;min-height:100vh;
  opacity:0;pointer-events:none;
  transition:opacity .35s ease,transform .35s ease;
  transform:translateX(60px);
  display:flex;flex-direction:column;
}
.step.active{opacity:1;pointer-events:auto;transform:translateX(0);position:relative}
.step.exit-left{opacity:0;transform:translateX(-60px);position:absolute}

/* ── Start screen ── */
.start-screen{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;text-align:center;padding:40px 20px;
}
.start-screen h1{
  font-size:clamp(2.5rem,8vw,4.5rem);font-weight:900;letter-spacing:6px;
  background:linear-gradient(135deg,var(--red),#ff6b8a);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.start-screen .tagline{
  color:var(--muted);margin-top:12px;font-size:1.1rem;font-style:italic;
}
.start-screen .instruction{
  color:var(--muted);margin-top:24px;font-size:0.9rem;
}
.start-btn{
  margin-top:40px;padding:18px 60px;border:none;border-radius:14px;
  background:linear-gradient(135deg,var(--red),#ff6b8a);color:#fff;
  font-size:1.2rem;font-weight:800;letter-spacing:2px;cursor:pointer;
  transition:transform .15s,box-shadow .15s;
}
.start-btn:hover{transform:scale(1.05);box-shadow:0 0 30px rgba(255,59,92,0.4)}

/* ── Top bar (steps) ── */
.top-bar{
  position:sticky;top:0;z-index:100;
  background:rgba(10,10,10,0.95);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  padding:12px 20px;
}
.top-bar-inner{
  max-width:700px;margin:0 auto;
  display:flex;align-items:center;justify-content:space-between;gap:12px;
}
.step-indicator{font-size:0.8rem;color:var(--muted);white-space:nowrap}
.mini-score{
  font-size:1.4rem;font-weight:900;transition:color .3s;
}
.progress-dots{display:flex;gap:6px;align-items:center}
.dot{
  width:10px;height:10px;border-radius:50%;background:var(--border);
  transition:background .3s,transform .3s;cursor:pointer;
}
.dot.completed{background:var(--red)}
.dot.current{background:var(--red);transform:scale(1.3);animation:pulse 1.5s infinite}
.dot.green-dot.completed{background:var(--green)}
.dot.green-dot.current{background:var(--green);transform:scale(1.3)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
@keyframes scorePulse{0%{transform:scale(1)}50%{transform:scale(1.3)}100%{transform:scale(1)}}
.score-flash{animation:scorePulse .3s ease}

/* ── Step content ── */
.step-content{
  max-width:700px;margin:0 auto;padding:20px 16px 100px;width:100%;
}
.step-header{
  text-align:center;margin-bottom:24px;
}
.step-header h2{
  font-size:1.5rem;font-weight:900;text-transform:uppercase;letter-spacing:2px;
}
.step-header h2.red{color:var(--red)}
.step-header h2.green{color:var(--green)}
.step-header .step-desc{color:var(--muted);font-size:0.85rem;margin-top:6px}

/* ── Trait cards ── */
.trait{
  display:flex;align-items:center;gap:12px;
  background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:12px 16px;margin-bottom:8px;cursor:pointer;
  transition:background .15s,border-color .15s;position:relative;
  -webkit-user-select:none;user-select:none;
}
.trait:hover{background:var(--card-hover)}
.trait.checked{border-color:var(--red)}
.trait.checked.bonus-trait{border-color:var(--green)}

.trait input{display:none}
.checkmark{
  width:22px;height:22px;min-width:22px;border-radius:6px;
  border:2px solid var(--border);display:flex;align-items:center;
  justify-content:center;transition:all .15s;font-size:13px;
}
.trait.checked .checkmark{background:var(--red);border-color:var(--red);color:#fff}
.trait.checked.bonus-trait .checkmark{background:var(--green);border-color:var(--green);color:#000}

.trait-info{flex:1;min-width:0}
.trait-name{font-weight:600;font-size:0.95rem}
.trait-tooltip{
  font-size:0.78rem;color:var(--muted);margin-top:2px;
  max-height:0;overflow:hidden;transition:max-height .25s ease;
}
.trait.show-tip .trait-tooltip{max-height:60px}

.trait-points{
  font-weight:800;font-size:0.9rem;white-space:nowrap;min-width:40px;text-align:right;
}
.trait-points.neg{color:var(--red)}
.trait-points.pos{color:var(--green)}

/* ── Navigation ── */
.nav-row{
  display:flex;justify-content:space-between;align-items:center;
  margin-top:24px;gap:12px;
}
.nav-btn{
  padding:14px 32px;border:none;border-radius:10px;
  font-weight:700;font-size:0.95rem;cursor:pointer;transition:opacity .15s,transform .1s;
}
.nav-btn:hover{opacity:0.85}
.nav-btn:active{transform:scale(0.97)}
.nav-next{background:var(--red);color:#fff}
.nav-next.green-next{background:var(--green);color:#000}
.nav-back{background:transparent;color:var(--muted);border:1px solid var(--border)}
.nav-back:hover{color:var(--text);border-color:var(--text)}
.nav-finish{background:linear-gradient(135deg,var(--green),#00cc6a);color:#000;font-size:1rem;letter-spacing:1px}

/* ── Results screen ── */
.results{
  max-width:700px;margin:0 auto;padding:40px 16px 60px;width:100%;
}
.results-score{text-align:center;margin-bottom:32px}
.results-score .big-score{
  font-size:clamp(4rem,12vw,7rem);font-weight:900;line-height:1;
  transition:color .3s;
}
.results-score .tier-label{
  font-size:clamp(1.3rem,4vw,2rem);font-weight:900;margin-top:8px;
  letter-spacing:2px;
}
.results-score .verdict-msg{
  color:var(--muted);font-size:1rem;font-style:italic;margin-top:8px;line-height:1.5;
}

/* Breakdown */
.section-card{
  background:var(--card);border:1px solid var(--border);border-radius:14px;
  padding:24px;margin-bottom:20px;
}
.section-card h3{
  font-size:1rem;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;
  margin-bottom:16px;
}
.breakdown-row{
  display:flex;align-items:center;gap:10px;margin-bottom:10px;
}
.breakdown-label{
  font-size:0.85rem;min-width:130px;color:var(--muted);
}
.breakdown-bar-wrap{
  flex:1;height:8px;background:#222;border-radius:8px;overflow:hidden;
}
.breakdown-bar{
  height:100%;border-radius:8px;transition:width .5s ease;min-width:2px;
}
.breakdown-val{
  font-size:0.85rem;font-weight:700;min-width:40px;text-align:right;
}

/* Profile */
.profile-text{
  font-size:0.95rem;line-height:1.8;color:var(--text);
  font-style:italic;letter-spacing:0.01em;
}
.profile-loading{
  display:flex;align-items:center;justify-content:center;gap:12px;
  padding:20px 0;color:var(--muted);font-style:italic;font-size:0.9rem;
}
.loading-spinner{
  width:32px;height:32px;border:3px solid var(--border);
  border-top-color:var(--gold);border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.profile-fade-in{animation:profileFadeIn .5s ease-in}
@keyframes profileFadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* Trait summary columns */
.trait-summary-cols{
  display:grid;grid-template-columns:1fr 1fr;gap:20px;
}
@media(max-width:500px){
  .trait-summary-cols{grid-template-columns:1fr}
}
.trait-summary-col h4{
  font-size:0.85rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;
  margin-bottom:10px;
}
.trait-summary-col h4.red-h{color:var(--red)}
.trait-summary-col h4.green-h{color:var(--green)}
.trait-summary-item{
  display:flex;justify-content:space-between;align-items:center;
  padding:6px 0;border-bottom:1px solid var(--border);
  font-size:0.85rem;
}
.trait-summary-item:last-child{border-bottom:none}
.trait-summary-item .pts{font-weight:700}
.trait-summary-item .pts.neg{color:var(--red)}
.trait-summary-item .pts.pos{color:var(--green)}
.empty-col{color:var(--muted);font-style:italic;font-size:0.85rem}

/* Action buttons */
.share-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:10px;
  max-width:400px;margin:0 auto;
}
.share-btn{
  display:flex;align-items:center;justify-content:center;gap:8px;
  padding:14px 16px;border:none;border-radius:10px;font-weight:700;
  font-size:0.85rem;cursor:pointer;transition:opacity .15s,transform .1s;
  text-decoration:none;color:#fff;
}
.share-btn:hover{opacity:0.85}
.share-btn:active{transform:scale(0.97)}
.share-btn.x-btn{background:#000;border:1px solid #333}
.share-btn.ig-btn{background:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888)}
.share-btn.copy-btn{background:var(--green);color:#000}
.share-btn.link-btn{background:#4a9eff;color:#fff}
.share-btn svg{width:18px;height:18px;fill:currentColor;flex-shrink:0}
.btn-row{display:flex;gap:12px;justify-content:center;margin-top:16px;flex-wrap:wrap}
.btn{
  padding:14px 32px;border:none;border-radius:10px;font-weight:700;
  font-size:0.95rem;cursor:pointer;transition:opacity .15s,transform .1s;
}
.btn:hover{opacity:0.85}
.btn:active{transform:scale(0.97)}
.btn-back{background:transparent;color:var(--muted);border:1px solid var(--border)}
.btn-back:hover{color:var(--text);border-color:var(--text)}
.btn-reset{background:var(--red);color:#fff}

/* Footer */
.footer{text-align:center;padding:40px 20px;color:var(--muted);font-size:0.8rem;line-height:1.6}

/* Animations */
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.12)}100%{transform:scale(1)}}
.pop{animation:pop .25s ease}
@keyframes countUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.count-up{animation:countUp .5s ease forwards}

/* Mobile */
@media(max-width:500px){
  .trait{padding:10px 12px;gap:10px}
  .top-bar{padding:10px 12px}
  .breakdown-label{min-width:90px;font-size:0.78rem}
  .nav-btn{padding:12px 20px;font-size:0.9rem}
}
</style>
</head>
<body>

<div class="wizard" id="wizard"></div>

<script>
const DATA = [
  { title:"Communication", desc:"How she texts and talks", type:"deduction", traits:[
    {name:"One-Word Texter",pts:-10,tip:"'K.' 'Sure.' 'Lol.' That's the whole vocabulary."},
    {name:"Takes 24h+ to Reply",pts:-10,tip:"She saw it. She just doesn't care."},
    {name:"Only Talks About Herself",pts:-15,tip:"You're not in a conversation, you're an audience."},
    {name:"Always on Phone During Dates",pts:-15,tip:"You're competing with TikTok. You're losing."},
    {name:"Argues About Word Choices",pts:-5,tip:"You said 'fine' not 'good' — 3-hour fight incoming."},
    {name:"Voice Notes Instead of Texts",pts:-5,tip:"Sending a 4-minute voice memo to say 'yes.'"},
  ]},
  { title:"Personality", desc:"Who she really is", type:"deduction", traits:[
    {name:'"All My Exes Are Crazy"',pts:-20,tip:"Plot twist: she's the common denominator."},
    {name:"Drama Magnet",pts:-15,tip:"If drama finds her everywhere, she IS the drama."},
    {name:"Love-Bombs First Date",pts:-15,tip:"'I've never felt this way before' — it's been 45 minutes."},
    {name:"Zero Hobbies",pts:-10,tip:"Netflix is not a hobby. Neither is shopping."},
    {name:"Chronically Late",pts:-10,tip:"'5 min away!' She hasn't left the house."},
    {name:'"Brutally Honest"',pts:-10,tip:"Translation: rude and proud of it."},
    {name:"Can't Cook and Proud",pts:-5,tip:"Uber Eats stock 📈 your wallet 📉"},
    {name:"Never Apologizes",pts:-15,tip:"It's always your fault. Always."},
  ]},
  { title:"Lifestyle", desc:"How she lives her life", type:"deduction", traits:[
    {name:"Has an OnlyFans",pts:-20,tip:"Everyone's seen more of her than you have."},
    {name:"MLM Boss Babe",pts:-20,tip:"'Hey hun! Want to be your own boss?' No."},
    {name:"Party Girl",pts:-20,tip:"Her liver has more miles than your car."},
    {name:"Still Talks to Her Ex",pts:-15,tip:"'He's just a friend' and other hilarious jokes."},
    {name:"Instagram Influencer",pts:-15,tip:"Every meal is a 20-minute photoshoot."},
    {name:'"I\'m Not Like Other Girls"',pts:-10,tip:"She is, in fact, exactly like other girls."},
    {name:"More Than 3 Cats",pts:-10,tip:"You're dating a cat colony manager."},
    {name:"Vegan and Won't Shut Up",pts:-5,tip:"You'll hear about it before, during, and after every meal."},
    {name:"Hard Drug User",pts:-25,tip:"81% of singles say instant dealbreaker. They're right."},
  ]},
  { title:"Financial", desc:"How she handles money", type:"deduction", traits:[
    {name:"Expensive Taste, No Job",pts:-20,tip:"Champagne dreams on your beer budget."},
    {name:"Never Offers to Split",pts:-10,tip:"Her wallet is purely decorative."},
    {name:"Shopping Addiction",pts:-10,tip:"Your doorstep is now an Amazon warehouse."},
    {name:"Venmos You After the Date",pts:-10,tip:"61% of singles say red flag. Math checks out."},
    {name:"Crypto Bro Female Edition",pts:-5,tip:"'Babe have you heard about this new altcoin?'"},
  ]},
  { title:"Social Media", desc:"Her online presence", type:"deduction", traits:[
    {name:"Posts Cryptic Relationship Quotes",pts:-10,tip:"Subliminal stories are her love language."},
    {name:"Heavily Filtered/AI Photos",pts:-10,tip:"56% instant turnoff. She doesn't look like that."},
    {name:"Stalks Your Old Posts",pts:-10,tip:"She liked your beach pic from 2019. At 2 AM."},
    {name:"Uses Astrology as Personality",pts:-10,tip:"'I can't help it, I'm a Scorpio.'"},
    {name:"Keeps Phone Face-Down",pts:-10,tip:"What's she hiding? Everything."},
    {name:"Posts Every Meal",pts:-5,tip:"Your food gets cold while she finds the right angle."},
  ]},
  { title:"Dating Behavior", desc:"Red flags on the date itself", type:"deduction", traits:[
    {name:"From Dubai",pts:-15,tip:"If you know, you know..."},
    {name:"Single Mom",pts:-15,tip:"You're not #1 priority, champ."},
    {name:"Coworker",pts:-15,tip:"HR has entered the chat."},
    {name:"Looks Nothing Like Her Photos",pts:-15,tip:"41% lose attraction. Catfish energy."},
    {name:"Mentions Her Ex Repeatedly",pts:-15,tip:"63% say this ends the date on the spot."},
    {name:"Feminist",pts:-5,tip:"Every dinner bill is a political debate."},
    {name:"Nurse",pts:-5,tip:"12-hour shifts mean she's never home... or always tired."},
    {name:"Teacher",pts:-5,tip:"Will grade your performance. Literally."},
    {name:"Lawyer",pts:-10,tip:"She will win every argument. Every. Single. One."},
  ]},
  { title:"The Ick Factor", desc:"Quirky dealbreakers", type:"deduction", traits:[
    {name:"Chews With Mouth Open",pts:-10,tip:"The soundtrack nobody asked for."},
    {name:"Has Tattoos",pts:-3,tip:"Every tattoo has a story you'll hear 47 times."},
    {name:"Baby Talk",pts:-5,tip:"'Does my widdle baby want some din-din?' You're 28."},
    {name:"Car Full of Trash",pts:-10,tip:"Her passenger seat is an archaeological dig site."},
    {name:"Claps When the Plane Lands",pts:-5,tip:"'We are not the same species.'"},
  ]},
  { title:"Green Flags", desc:"The good stuff", type:"bonus", traits:[
    {name:"Can Actually Cook",pts:10,tip:"A home-cooked meal hits different."},
    {name:"Laughs at Your Jokes",pts:10,tip:"Even the bad ones. Especially the bad ones."},
    {name:"Watches Sports With You",pts:10,tip:"Sunday football just got an upgrade."},
    {name:"Low Maintenance",pts:10,tip:"Ready in 15 minutes. No drama. Just vibes."},
    {name:"Gets Along With Your Boys",pts:10,tip:"The boys approve. This is non-negotiable."},
    {name:"Has Her Own Money",pts:10,tip:"Independent queen. Your wallet breathes easy."},
    {name:"Good Relationship With Her Dad",pts:10,tip:"Daddy issues? Not here."},
    {name:"Kind to Waitstaff",pts:10,tip:"How she treats them is how she'll treat you."},
    {name:"Remembers Small Details",pts:10,tip:"She remembered your coffee order from 3 weeks ago."},
    {name:"Gym Girl",pts:5,tip:"She takes care of herself. Respect."},
    {name:"No Social Media Drama",pts:5,tip:"No vague-posting. No subliminal stories. Peace."},
    {name:"Texts Back Fast",pts:5,tip:"She actually wants to talk to you. Wild concept."},
    {name:"Comfortable With Silence",pts:5,tip:"You can just... exist together. No pressure."},
    {name:"Genuinely Curious About You",pts:5,tip:"She asks about your hobbies AND actually listens."},
  ]},
];

const TIERS = [
  {min:95,label:"Wifey Material",msg:"Lock her down immediately. Do NOT fumble this.",color:"var(--green)"},
  {min:80,label:"Solid Choice",msg:"She's a keeper. Minor flaws, but who's perfect?",color:"#66bb6a"},
  {min:60,label:"Proceed with Caution",msg:"She's got potential, but keep your eyes open, king.",color:"var(--gold)"},
  {min:40,label:"Situationship at Best",msg:"Don't catch feelings. Seriously.",color:"var(--orange)"},
  {min:20,label:"For the Streets",msg:"She belongs to the streets. You know it.",color:"#ff5722"},
  {min:0,label:"RUN.",msg:"Delete her number. Block. Move cities if needed.",color:"var(--red)"},
  {min:-Infinity,label:"WITNESS PROTECTION",msg:"This isn't a date, it's a crime scene.",color:"var(--deep-red)"},
];

// State
const checked = {}; // "catIdx_traitIdx" -> bool
let currentStep = 0; // 0 = start, 1-8 = categories, 9 = results
const TOTAL_STEPS = DATA.length; // 8
const GROQ_API_KEY = localStorage.getItem('groq_api_key')||'';
let cachedAIProfile = null;
let aiProfilePending = false;

function getTier(score){
  return TIERS.find(t=>score>=t.min);
}

function calcScore(){
  let s=100;
  DATA.forEach((cat,ci)=>{
    cat.traits.forEach((t,ti)=>{
      if(checked[ci+'_'+ti]) s+=t.pts;
    });
  });
  return s;
}

function catScore(ci){
  let s=0;
  DATA[ci].traits.forEach((t,ti)=>{
    if(checked[ci+'_'+ti]) s+=t.pts;
  });
  return s;
}

function getCheckedTraits(){
  const reds=[], greens=[];
  DATA.forEach((cat,ci)=>{
    cat.traits.forEach((t,ti)=>{
      if(checked[ci+'_'+ti]){
        if(t.pts<0) reds.push({name:t.name,pts:t.pts,cat:cat.title});
        else greens.push({name:t.name,pts:t.pts,cat:cat.title});
      }
    });
  });
  return {reds,greens};
}

// ── Trait-theme mapping (shared by generateProfile + generateAIProfile) ──
const T={
    // Communication
    "One-Word Texter":{g:"unavailable",d:"monosyllabic digital correspondence"},
    "Takes 24h+ to Reply":{g:"unavailable",d:"calculated 24-hour response delays"},
    "Only Talks About Herself":{g:"self-absorbed",d:"a conversational monopoly where you serve as live studio audience"},
    "Always on Phone During Dates":{g:"disengaged",d:"chronic device dependency mid-date (you are ambient company)"},
    "Argues About Word Choices":{g:"difficult",d:"micro-linguistic policing ('fine' vs 'good' — 3-hour tribunal)"},
    "Voice Notes Instead of Texts":{g:"chaotic",d:"replacing texts with unsolicited 4-minute audio memoirs"},
    // Personality
    '"All My Exes Are Crazy"':{g:"delusional",d:"a conspicuous failure to identify herself as the common denominator"},
    "Drama Magnet":{g:"chaotic",d:"a statistically improbable frequency of interpersonal conflict"},
    "Love-Bombs First Date":{g:"chaotic",d:"declaring soulmate status within the first 45 minutes"},
    "Zero Hobbies":{g:"low-effort",d:"a recreational vacuum filled entirely by Netflix and online shopping"},
    "Chronically Late":{g:"difficult",d:"chronic temporal delinquency ('5 min away' — hasn't left the house)"},
    '"Brutally Honest"':{g:"difficult",d:"weaponized candor where the brutality is the feature, not the honesty"},
    "Can't Cook and Proud":{g:"low-effort",d:"culinary abstinence worn as a badge of honor"},
    "Never Apologizes":{g:"difficult",d:"a conflict-resolution framework that omits the apology module entirely"},
    // Lifestyle
    "Has an OnlyFans":{g:"wild-card",d:"monetized public content creation (everyone's seen more of her than you)"},
    "MLM Boss Babe":{g:"delusional",d:"participation in a reverse-revenue business model she calls entrepreneurship"},
    "Party Girl":{g:"chaotic",d:"a nightlife frequency that qualifies as a second career"},
    "Still Talks to Her Ex":{g:"trust-issue",d:"active communication with a theoretically former partner"},
    "Instagram Influencer":{g:"image-obsessed",d:"a content-creation lifestyle cosplaying as a personality"},
    '"I\'m Not Like Other Girls"':{g:"delusional",d:"aggressively proclaimed uniqueness that is, ironically, extremely common"},
    "More Than 3 Cats":{g:"eccentric",d:"a feline-to-human ratio exceeding clinical norms"},
    "Vegan and Won't Shut Up":{g:"difficult",d:"unsolicited dietary evangelism before, during, and after every meal"},
    "Hard Drug User":{g:"wild-card",d:"substance use classified as an instant dealbreaker by 81% of the dating population"},
    // Financial
    "Expensive Taste, No Job":{g:"financial-risk",d:"champagne expectations on an unemployment timeline"},
    "Never Offers to Split":{g:"financial-risk",d:"a wallet that serves a purely decorative function"},

// ── Profile generator ──
function generateProfile(){
  // Theme metadata: intro templates + closers (multiple options per theme, picked by trait-count seed)
  const M={
    "unavailable":{
      i:["The subject's emotional availability registers somewhere between 'out of office' and 'permanently relocated.'",
         "From a responsiveness standpoint, you rank somewhere between her spam folder and a push notification she hasn't enabled."],
      c:["You are not being ghosted — you are being systematically deprioritized with plausible deniability.",
         "The prognosis for consistent emotional reciprocity is, clinically speaking, grim."]
    },
    "disengaged":{
      i:["The subject's attention during in-person encounters is best described as 'physically present, digitally elsewhere.'",
         "Her engagement level during dates hovers somewhere between 'waiting room' and 'on hold with customer service.'"],
      c:["You are not a companion — you are ambient background noise while she scrolls.",
         "Competing with a 6-inch screen for eye contact is a battle no amount of charm can win."]
    },
    "self-absorbed":{
      i:["The conversational dynamic reveals a pronounced asymmetry in topic distribution."],
      c:["You are not a participant in dialogue — you are a captive audience with a dinner reservation."]
    },
    "difficult":{
      i:["The interpersonal friction coefficient here warrants a dedicated risk assessment.",
         "The operational overhead of this relationship registers in the upper percentile of the maintenance spectrum."],
      c:["Patience, in this context, is not a virtue — it is a full-time job requirement.",
         "The energy expenditure required to maintain equilibrium may exceed any conceivable return on investment."]
    },
    "chaotic":{
      i:["The chaos index on this individual is, by any standard metric, elevated.",
         "Her life operates less on routine and more on a crisis-to-crisis momentum that would exhaust a first responder."],
      c:["Predictability is not on the menu. Neither, to be fair, is boredom.",
         "Strap in — this is less a relationship and more a weather event."]
    },
    "delusional":{
      i:["The subject's relationship with objective reality is best described as 'loosely affiliated.'",
         "A recurring pattern of reality-adjacent thinking emerges across multiple data points."],
      c:["The gap between self-perception and observable behavior could comfortably house a mid-size sedan.",
         "Corrective perspective is strongly recommended, though unlikely to be accepted."]
    },
    "image-obsessed":{
      i:["Image management appears to be the primary occupation, with actual life serving as raw content.",
         "Considerable resources are devoted to curating a public-facing identity that may diverge significantly from the source material."],
      c:["The curated self has largely consumed the actual self — you are, in practice, dating a brand.",
         "What you see is, by careful design, not what you get."]
    },
    "trust-issue":{
      i:["Several behavioral indicators suggest the trust infrastructure in this dynamic is structurally compromised.",
         "The trust profile here exhibits load-bearing cracks that merit serious inspection."],
      c:["Transparency, in this relationship, is a theoretical concept — not an operational policy.",
         "The foundation you'd be building on has pre-existing fractures. Proceed with engineering-grade caution."]
    },
    "financial-risk":{
      i:["The financial trajectory of this relationship resembles a leveraged position with unlimited downside exposure.",
         "An analysis of spending patterns versus income generation reveals a deficit model you are expected to personally subsidize."],
      c:["Your wallet is not an accessory in this arrangement — it is load-bearing infrastructure.",
         "The ROI calculation on this relationship requires a spreadsheet, a stiff drink, and a strong stomach."]
    },
    "low-effort":{
      i:["The effort-to-output ratio across key life domains suggests a deep philosophical commitment to the status quo."],
      c:["Growth is not on the roadmap. Comfortable stagnation is both the destination and the journey."]
    },
    "wild-card":{
      i:["Certain data points here defy conventional categorization, occupying what risk analysts call 'the tail of the distribution.'"],
      c:["These are not red flags so much as signal flares visible from low orbit."]
    },
    "ick":{
      i:["The visceral-response indicators — colloquially, 'the ick' — have registered at clinically notable levels.",
         "Certain observed behaviors trigger involuntary aversion responses that no amount of rational override can suppress."],
      c:["These are not mere preferences — they are neurological events. The ick does not negotiate.",
         "Once observed, these cannot be un-observed. They will resurface unprompted at 3 AM. Guaranteed."]
    },
    "situational":{
      i:["Beyond personality, several situational variables introduce logistical complexity to the relationship calculus."],
      c:["These are not character flaws per se — they are circumstantial factors that nonetheless affect the cost-benefit analysis."]
    },
    "eccentric":{
      i:["The subject demonstrates lifestyle choices that fall comfortably outside standard deviation."],
      c:["Eccentricity is not inherently disqualifying, but it does require a flexible definition of 'normal.'"]
    },
    "keeper":{
      i:["On the credit side of the ledger, empirically validated positive indicators present themselves.",
         "The green-flag cluster here deserves recognition — these are not trivial virtues in the current dating market."],
      c:["These traits represent genuine long-term relationship capital. Weight them accordingly in your final calculus.",
         "In a dating pool where the bar is famously subterranean, she clears it with room to spare on these dimensions."]
    }
  };

  // ── Collect checked traits with their theme tags ──
  const items=[];
  DATA.forEach((cat,ci)=>{
    cat.traits.forEach((t,ti)=>{
      if(checked[ci+'_'+ti]){
        const a=T[t.name];
        if(a) items.push({tag:a.g, desc:a.d, name:t.name, pts:t.pts});
      }
    });
  });

  if(items.length===0)
    return "No data points were recorded. The subject either presented zero observable characteristics — which is itself a characteristic — or the evaluator fell asleep mid-assessment. Inconclusive. Retry with caffeine.";

  const score=calcScore();
  const {reds,greens}=getCheckedTraits();

  // ── Group by theme tag ──
  const groups={};
  items.forEach(it=>{
    if(!groups[it.tag]) groups[it.tag]=[];
    groups[it.tag].push(it);
  });

  // Separate red-flag themes from keeper
  const redTags=Object.keys(groups).filter(t=>t!=='keeper')
    .sort((a,b)=>{
      const sa=groups[a].reduce((s,i)=>s+Math.abs(i.pts),0);
      const sb=groups[b].reduce((s,i)=>s+Math.abs(i.pts),0);
      return sb-sa; // highest impact first
    });

  const pick=(arr,seed)=>arr[Math.abs(seed)%arr.length];
  const paras=[];
  const isHighScore=score>=80;

  // ── Helper: build red-flag paragraphs ──
  function buildRedParas(maxClusters,maxOrphans){
    for(const tag of redTags.slice(0,maxClusters)){
      const meta=M[tag];
      if(!meta) continue;
      const ds=groups[tag].map(i=>i.desc);
      const seed=groups[tag].length+groups[tag].reduce((s,i)=>s+Math.abs(i.pts),0);
      let p=pick(meta.i,seed)+' ';
      if(ds.length===1) p+='The evidence: '+ds[0]+'.';
      else if(ds.length===2) p+='The evidence — '+ds[0]+' combined with '+ds[1]+' — speaks for itself.';
      else p+='Key indicators include '+ds.slice(0,-1).join(', ')+', and '+ds[ds.length-1]+'.';
      p+=' '+pick(meta.c,seed);
      paras.push(p);
    }
    const orphans=[];
    for(const tag of redTags.slice(maxClusters)){
      groups[tag].forEach(i=>orphans.push(i.desc));
    }
    if(orphans.length>0&&paras.length<3){
      const ods=orphans.slice(0,maxOrphans);
      if(ods.length===1)
        paras.push('Also noted: '+ods[0]+' — a minor but non-trivial footnote in the overall dossier.');
      else
        paras.push('Further field observations include '+ods.slice(0,-1).join(', ')+', and '+ods[ods.length-1]+'. Each contributes to a composite risk profile that grows more intricate with every data point.');
    }
  }

  // ── Helper: build green-flag paragraph ──
  function buildGreenPara(){
    if(!groups['keeper']||groups['keeper'].length===0) return;
    const meta=M['keeper'];
    const ds=groups['keeper'].map(i=>i.desc);
    const seed=ds.length;
    let p;
    if(isHighScore){
      // Lead with strong positive framing for high scores
      if(ds.length===1){
        p='The standout indicator: '+ds[0]+'. A single trait, but a significant one that elevates the overall assessment.';
      } else {
        p='The green-flag portfolio here is substantial. ';
        if(ds.length===2) p+='Key strengths: '+ds[0]+' and '+ds[1]+'.';
        else p+='The portfolio includes '+ds.slice(0,-1).join(', ')+', and '+ds[ds.length-1]+'.';
        p+=' In a dating pool where the bar is famously subterranean, she clears it with room to spare on these dimensions.';
      }
    } else {
      if(ds.length===1){
        p='One green flag stands amid the wreckage: '+ds[0]+'. It is a single data point of hope in an otherwise turbulent dataset.';
      } else {
        p=pick(meta.i,seed)+' ';
        if(ds.length===2) p+='Noted strengths: '+ds[0]+' and '+ds[1]+'.';
        else p+='The portfolio includes '+ds.slice(0,-1).join(', ')+', and '+ds[ds.length-1]+'.';
        p+=' '+pick(meta.c,seed);
      }
    }
    paras.push(p);
  }

  // ── Structure depends on score: lead with the dominant signal ──
  if(isHighScore){
    // HIGH SCORES: green flags first, red flags as footnotes
    buildGreenPara();
    if(redTags.length>0){
      const allRedDescs=[];
      redTags.forEach(tag=>{groups[tag].forEach(i=>allRedDescs.push(i.desc))});
      if(allRedDescs.length===1)
        paras.push('The file does contain one minor note — '+allRedDescs[0]+' — but in context, this registers as a charming quirk rather than a structural concern.');
      else if(allRedDescs.length<=3)
        paras.push('For the record, the dossier flags '+allRedDescs.join(' and ')+'. These are catalogued but ultimately cosmetic blemishes on an otherwise impressive specimen.');
      else
        paras.push('Minor infractions on file include '+allRedDescs.slice(0,3).join(', ')+', among others. None rise to the level of actionable concern given the overall assessment.');
    }
  } else {
    // LOW/MID SCORES: red flags first, green flags as secondary
    buildRedParas(2,4);
    buildGreenPara();
  }

  // ── Score-based synthesis closer ──
  if(score<=0)
    paras.push('Final clinical assessment: this is not a dating prospect — it is an incident report in the making. The recommended intervention is immediate and complete geographic relocation.');
  else if(score<20)
    paras.push('The aggregate data recommends the Witness Protection protocol: new city, new phone number, scorched-earth digital cleanse. This is not pessimism — it is actuarial science.');
  else if(score<40)
    paras.push(`With a composite score of ${score}, the risk rating would make any relationship underwriter nervous. She belongs, per the peer-reviewed literature, to the streets.`);
  else if(score<60)
    paras.push(`A score of ${score} places this squarely in uncertain territory — a holding pattern with no scheduled landing. Proceed with emotional guardrails firmly installed.`);
  else if(score<80)
    paras.push(`At ${score} points, the prospect shows real potential tempered by non-trivial risk factors. The recommendation: proceed with eyes open and expectations carefully calibrated.`);
  else if(score>=95&&greens.length>=5)
    paras.push('Final assessment: the data is unequivocal. This individual exceeds benchmark expectations across multiple dimensions. The peer-reviewed recommendation, stated with full academic conviction: lock it down. Immediately.');
  else if(score>=80)
    paras.push('The composite score indicates a high-quality match with tolerable deviations from the theoretical ideal. In portfolio terms: strong hold with bullish long-term outlook.');

  return paras.slice(0,4).join('<br><br>');
}

// ── AI Profile via Groq API ──
async function generateAIProfile(){
  const score=calcScore();
  const {reds,greens}=getCheckedTraits();
  const allTraits=[...reds,...greens];
  if(allTraits.length===0) return null;

  const traitLines=allTraits.map(t=>{
    const meta=T[t.name];
    const desc=meta?` — ${meta.d}`:'';
    return `- ${t.name} (${t.cat}, ${t.pts>0?'+':''}${t.pts}pts)${desc}`;
  }).join('\n');

  const tier=getTier(score);
  const toneGuide=score>=95?'Write as if filing an urgent recommendation to not let this one get away. Every red flag is a charming quirk. Final line: emphatic lock-it-down.'
    :score>=80?'Write a glowing review with 1-2 wry footnotes about minor red flags. Final line: strong endorsement.'
    :score>=60?'Balanced analysis. Green flags get credit, red flags get dry commentary. Final line: cautious optimism.'
    :score>=40?'Skeptical analyst. Red flags dominate the narrative. Green flags are noted but insufficient. Final line: advise caution.'
    :'Full roast. Green flags are ironic consolation prizes. Final line: exit strategy.';

  const bannedNote=score>=80?' BANNED phrases — do NOT use any of these: "paradox", "situationship", "proceed at your own risk", "mixed signals", "proceed with caution", "double-edged sword". The score is high — there is no ambiguity.':'';

  const scoreFraming=score>100
    ?`Score: ${score} out of 100 base (scores above 100 mean green flags outweigh all red flags — this is an exceptional result)`
    :`Score: ${score} out of 100`;

  const systemPrompt=`You are a dry, clinical dating analyst writing personality profiles with bone-dry wit. Write in third person referring to "the subject." No emojis. No markdown. No bullet points. Flowing prose only.

STRUCTURE (follow exactly):
- Paragraph 1: Lead with the DOMINANT signal. If green flags outweigh red flags, open with what makes the subject impressive. If red flags dominate, open with the primary concerns.
- Paragraph 2: Address the MINORITY flags as secondary notes. For high scorers, red flags are minor footnotes. For low scorers, green flags are small consolation.
- Final sentence: ONE clear clinical recommendation. Pick a single direction — do not hedge with "but" or contradict yourself. The recommendation must match the score.

CRITICAL RULES:
- The entire profile must express ONE coherent opinion. Do not praise in one sentence and warn in the next.
- Every sentence must reinforce the same overall verdict — not alternate between positive and negative.${bannedNote}`;

  const exampleBlock=score>=80?`

EXAMPLE of correct high-score style (do NOT copy verbatim — use as tone reference only):
"The subject presents a remarkably clean dossier. Her ability to hold a conversation without checking her phone suggests either genuine interest or an expired data plan — either way, the result is the same. The minor infractions on file — an enthusiasm for astrology, a suspicious number of throw pillows — are catalogued but ultimately irrelevant to the final assessment. Clinical recommendation: this is not a drill. Secure commitment at earliest opportunity."
`:'';

  const userPrompt=`Write a personality profile for this date.

${scoreFraming}
Tier: "${tier.label}" — "${tier.msg}"

Red flags (${reds.length}):
${reds.length?reds.map(t=>{const m=T[t.name];return `- ${t.name} (${t.pts}pts)${m?' — '+m.d:''}`}).join('\n'):'None'}

Green flags (${greens.length}):
${greens.length?greens.map(t=>{const m=T[t.name];return `- ${t.name} (+${t.pts}pts)${m?' — '+m.d:''}`}).join('\n'):'None'}

Tone guidance: ${toneGuide}${exampleBlock}

Write 2-4 paragraphs, under 250 words. Be specific about the traits listed — reference them directly with dry analytical humor. End with ONE clear clinical recommendation that matches the score. Do not contradict yourself.`;

  const controller=new AbortController();
  const timeout=setTimeout(()=>controller.abort(),15000);

  try{
    const res=await fetch('https://api.groq.com/openai/v1/chat/completions',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'Authorization':'Bearer '+GROQ_API_KEY
      },
      body:JSON.stringify({
        model:'llama-3.3-70b-versatile',
        messages:[
          {role:'system',content:systemPrompt},
          {role:'user',content:userPrompt}
        ],
        temperature:0.55,
        max_tokens:500
      }),
      signal:controller.signal
    });
    clearTimeout(timeout);
    if(!res.ok) throw new Error('API '+res.status);
    const data=await res.json();
    const text=data.choices?.[0]?.message?.content;
    if(!text) throw new Error('Empty response');
    return text.trim().replace(/\n\n/g,'<br><br>').replace(/\n/g,'<br><br>');
  }catch(e){
    clearTimeout(timeout);
    console.warn('AI profile failed:',e.message);
    return null;
  }
}

function getProfileText(){
  const raw=cachedAIProfile||generateProfile();
  return raw?raw.replace(/<br><br>/g,'\n\n'):'';
}

            </div>
            <div class="trait-summary-col">
              <h4 class="green-h">Green Flags (${greens.length})</h4>
              ${greens.length?greens.map(g=>`<div class="trait-summary-item">
                <span>${g.name}</span><span class="pts pos">+${g.pts}</span>
              </div>`).join(''):`<div class="empty-col">None checked</div>`}
            </div>
          </div>
        </div>

        <div class="section-card">
          <h3>Share Your Results</h3>
          <div class="share-grid">
            <button class="share-btn x-btn" onclick="shareToX()">
              <svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
              Post on X
            </button>
            <button class="share-btn ig-btn" onclick="copyForIG()">
              <svg viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg>
              Copy for IG
            </button>
            <button class="share-btn link-btn" onclick="copyLink()">
              <svg viewBox="0 0 24 24"><path d="M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1zM8 13h8v-2H8v2zm9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1s-1.39 3.1-3.1 3.1h-4V17h4c2.76 0 5-2.24 5-5s-2.24-5-5-5z"/></svg>
              Copy Link
            </button>
            <button class="share-btn copy-btn" onclick="copyText()">
              <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
              Copy Text
            </button>
          </div>
        </div>
        <div class="btn-row">
          <button class="btn btn-back" onclick="goTo(${TOTAL_STEPS})">Back to Questions</button>
          <button class="btn btn-reset" onclick="resetAll()">Start Over</button>
        </div>

        <div class="footer">
          <p>This is satire. Please do not actually score your dates.<br>
          Made for laughs, not life decisions.</p>
        </div>
      </div>
    </div>`;
  }

  wiz.innerHTML=html;

  // Attach tooltip listeners
  document.querySelectorAll('.trait').forEach(el=>{
    el.addEventListener('mouseenter',()=>el.classList.add('show-tip'));
    el.addEventListener('mouseleave',()=>el.classList.remove('show-tip'));
    el.addEventListener('touchstart',()=>el.classList.toggle('show-tip'),{passive:true});
  });

  // AI profile async trigger
  const resultsActive=currentStep===TOTAL_STEPS+1;
  if(resultsActive&&!cachedAIProfile&&!aiProfilePending&&GROQ_API_KEY){
    aiProfilePending=true;
    generateAIProfile().then(result=>{
      aiProfilePending=false;
      const loader=document.getElementById('profile-loading');
      const el=document.getElementById('profile-text');
      if(result){
        cachedAIProfile=result;
        if(loader) loader.remove();
        if(el){el.innerHTML=result;el.style.display='';el.classList.add('profile-fade-in');}
      }else{
        if(loader) loader.remove();
        if(el) el.style.display='';
      }
    });
  }
}

function toggleTrait(el,key){
  checked[key]=!checked[key];
  const on=checked[key];
  // Toggle checked class and checkbox directly
  if(on) el.classList.add('checked'); else el.classList.remove('checked');
  el.querySelector('input').checked=on;
  el.querySelector('.checkmark').innerHTML=on?'&#10003;':'';
  // Update mini-score with pulse animation
  const ms=document.getElementById('mini-score-'+currentStep);
  if(ms){
    ms.textContent=Math.max(0,Math.min(100,calcScore()));
    ms.classList.remove('score-flash');
    void ms.offsetWidth;
    ms.classList.add('score-flash');
  }
}

function goTo(step){
  cachedAIProfile=null;
  currentStep=step;
  render();
  window.scrollTo({top:0,behavior:'instant'});
}

function resetAll(){
  Object.keys(checked).forEach(k=>delete checked[k]);
  cachedAIProfile=null;
  aiProfilePending=false;
  currentStep=0;
  render();
}

function promptApiKey(){
  const current=localStorage.getItem('groq_api_key')||'';
  const key=prompt('Enter your Groq API key for AI-generated profiles.\nGet one free at console.groq.com/keys\n\nLeave blank to disable AI profiles.',current);
  if(key===null) return; // cancelled
  if(key){localStorage.setItem('groq_api_key',key);}
  else{localStorage.removeItem('groq_api_key');}
  location.reload();
}

const SITE_URL='https://bro-xuan.github.io/date-scoring/';

function getShareText(){
  const score=calcScore();
  const tier=getTier(score);
  const profile=getProfileText();
  let text=`DATE SCORE: ${Math.max(0,Math.min(100,score))} — ${tier.label}\n"${tier.msg}"\n\n`;
  if(profile) text+=profile+'\n\n';
  text+=`Rate your date: ${SITE_URL}`;
  return text;
}

function getFullText(){
  const score=calcScore();
  const tier=getTier(score);
  const {reds,greens}=getCheckedTraits();
  const profile=getProfileText();
  let text=`DATE SCORE: ${Math.max(0,Math.min(100,score))} — ${tier.label}\n"${tier.msg}"\n\n`;
  if(profile) text+=profile+'\n\n';
  if(reds.length) text+=`🚩 Red Flags: ${reds.map(r=>r.name).join(', ')}\n`;
  if(greens.length) text+=`✅ Green Flags: ${greens.map(g=>g.name).join(', ')}\n`;
  text+=`\nRate your date: ${SITE_URL}`;
  return text;
}

function flashBtn(btn,msg){
  const orig=btn.innerHTML;
  const origText=btn.textContent;
  btn.textContent='✓ '+msg;
  setTimeout(()=>btn.innerHTML=orig,1500);
}

function shareToX(){
  const score=Math.max(0,Math.min(100,calcScore()));
  const tier=getTier(calcScore());
  const text=`DATE SCORE: ${score} — ${tier.label}\n"${tier.msg}"\n\nRate your date: ${SITE_URL}`;
  const url='https://x.com/intent/tweet?text='+encodeURIComponent(text);
  window.open(url,'_blank','noopener');
}

function copyForIG(){
  const text=getFullText();
  navigator.clipboard.writeText(text).then(()=>{
    const btn=document.querySelector('.ig-btn');
    flashBtn(btn,'Copied! Paste in IG');
  }).catch(()=>{});
}

function copyLink(){
  navigator.clipboard.writeText(SITE_URL).then(()=>{
    const btn=document.querySelector('.link-btn');
    flashBtn(btn,'Link Copied!');
  }).catch(()=>{});
}

function copyText(){
  const text=getFullText();
  navigator.clipboard.writeText(text).then(()=>{
    const btn=document.querySelector('.copy-btn');
    flashBtn(btn,'Copied!');
  }).catch(()=>{});
}

// Init
render();
</script>
</body>
</html>
